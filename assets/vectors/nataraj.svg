<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- BODY -->
  <ellipse cx="100" cy="120" rx="35" ry="45" fill="#B71C1C" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- HEAD -->
  <circle cx="100" cy="55" r="28" fill="#B71C1C" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- CROWN/HEADDRESS -->
  <path d="M 75 35 Q 100 15 125 35 L 120 45 Q 100 30 80 45 Z" fill="#FFC107" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- FACE DETAILS -->
  <circle cx="92" cy="50" r="3" fill="#FFC107"/>
  <circle cx="108" cy="50" r="3" fill="#FFC107"/>
  <path d="M 95 60 Q 100 65 105 60" stroke="#FFC107" stroke-width="2" fill="none"/>
  
  <!-- LEFT ARM (raised) -->
  <line x1="70" y1="110" x2="45" y2="70" stroke="#B71C1C" stroke-width="8" stroke-linecap="round"/>
  <circle cx="45" cy="70" r="6" fill="#FFC107" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- RIGHT ARM (extended) -->
  <line x1="130" y1="115" x2="165" y2="100" stroke="#B71C1C" stroke-width="8" stroke-linecap="round"/>
  <circle cx="165" cy="100" r="6" fill="#FFC107" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- LEFT LEG (bent) -->
  <path d="M 85 160 Q 75 190 70 230" stroke="#B71C1C" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="70" cy="230" r="5" fill="#FFC107" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- RIGHT LEG (extended) -->
  <path d="M 115 160 Q 130 180 140 240" stroke="#B71C1C" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="140" cy="240" r="5" fill="#FFC107" stroke="#B71C1C" stroke-width="2"/>
  
  <!-- JEWELRY - NECKLACE -->
  <path d="M 75 125 Q 100 135 125 125" stroke="#FFC107" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- JEWELRY - ARMBAND -->
  <circle cx="50" cy="85" r="4" fill="none" stroke="#FFC107" stroke-width="2"/>
  
  <!-- DECORATIVE CIRCLE FRAME (Chakra) -->
  <circle cx="100" cy="120" r="95" fill="none" stroke="#FFC107" stroke-width="3" opacity="0.3"/>
  <circle cx="100" cy="120" r="90" fill="none" stroke="#B71C1C" stroke-width="2" opacity="0.2"/>
</svg>
