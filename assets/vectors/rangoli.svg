<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- OUTER DIAMOND PATTERN -->
  <g stroke="#B71C1C" stroke-width="1.5" fill="none" opacity="0.4">
    <circle cx="100" cy="100" r="80"/>
    <circle cx="100" cy="100" r="65"/>
    <circle cx="100" cy="100" r="50"/>
    <circle cx="100" cy="100" r="35"/>
    <circle cx="100" cy="100" r="20"/>
  </g>
  
  <!-- GEOMETRIC PATTERN -->
  <g stroke="#FFC107" stroke-width="1" fill="none" opacity="0.3">
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="35" y1="35" x2="165" y2="165"/>
    <line x1="165" y1="35" x2="35" y2="165"/>
  </g>
  
  <!-- DECORATIVE DOTS -->
  <g fill="#FFC107" opacity="0.3">
    <circle cx="100" cy="30" r="2"/>
    <circle cx="100" cy="170" r="2"/>
    <circle cx="30" cy="100" r="2"/>
    <circle cx="170" cy="100" r="2"/>
    <circle cx="45" cy="45" r="2"/>
    <circle cx="155" cy="155" r="2"/>
    <circle cx="155" cy="45" r="2"/>
    <circle cx="45" cy="155" r="2"/>
  </g>
</svg>
